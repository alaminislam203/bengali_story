    <script>
      // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This occurs when third-party scripts (like Monetag/PropellerAds) try to wrap window.fetch
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.warn('Blocked attempt to overwrite window.fetch'); },
            configurable: true
          });
        } catch (e) {
          // If already locked, we can't do much here, but this script runs early.
        }
      })();
    </script>
